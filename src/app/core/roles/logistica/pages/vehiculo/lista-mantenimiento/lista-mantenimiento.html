<!-- Se agrega la clase table-scroll-container y un alto máximo -->
<div class="m-2 md:m-5 border border-gray-200 rounded-lg shadow-sm table-scroll-container">
  <table mat-table [dataSource]="mantenimiento" class="mat-elevation-z8 full-width">
    
    <!-- ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let m"> {{m.id_mantenimiento}} </td>
    </ng-container>

    <!-- Descripción -->
    <ng-container matColumnDef="descripcion">
      <th mat-header-cell *matHeaderCellDef> Descripción </th>
      <td mat-cell *matCellDef="let m"> {{m.descripcion}} </td>
    </ng-container>

    <!-- Fecha -->
    <ng-container matColumnDef="fecha">
      <th mat-header-cell *matHeaderCellDef> Fecha </th>
      <td mat-cell *matCellDef="let m"> {{m.fecha}} </td>
    </ng-container>

    <!-- Voluntario -->
    <ng-container matColumnDef="voluntario">
      <th mat-header-cell *matHeaderCellDef> Voluntario </th>
      <td mat-cell *matCellDef="let m"> 
        👨‍🚒 {{m.voluntario?.nombre}} {{m.voluntario?.apellido_paterno}} 
      </td>
    </ng-container>

    <!-- ACCIONES -->
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let m">
        <button mat-icon-button color="warn" (click)="eliminar(m)">🗑️</button>
      </td>
    </ng-container>

    <!-- HEADER: Se añade 'sticky' para que se quede fijo arriba al hacer scroll -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <!-- ROW -->
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
