
<table mat-table [dataSource]="mantenimiento" class="mat-elevation-z8 full-width">

  <!-- ID -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef> ID </th>
    <td mat-cell *matCellDef="let m"> {{m.id_mantenimiento}} </td>
  </ng-container>

  <!-- Descripción -->
  <ng-container matColumnDef="descripcion">
    <th mat-header-cell *matHeaderCellDef> Descripción </th>
    <td mat-cell *matCellDef="let m"> {{m.descripcion}} </td>
  </ng-container>

  <!-- Fecha -->
  <ng-container matColumnDef="fecha">
    <th mat-header-cell *matHeaderCellDef> Fecha </th>
    <td mat-cell *matCellDef="let m"> {{m.fecha }} </td>
  </ng-container>

  

  <!-- Voluntario -->
  <ng-container matColumnDef="voluntario">
    <th mat-header-cell *matHeaderCellDef> Voluntario </th>
    <td mat-cell *matCellDef="let m">
      👨‍🚒 {{m.voluntario?.nombre}} {{m.voluntario?.apellido_paterno}}
    </td>
  </ng-container>

  <!-- ACCIONES -->
  <ng-container matColumnDef="acciones">
    <th mat-header-cell *matHeaderCellDef> Acciones </th>
    <td mat-cell *matCellDef="let m">

      <button mat-icon-button color="primary" >
        ✏️
      </button>

      <button mat-icon-button color="warn" (click)="eliminar(m)" >
        🗑️
      </button>

    </td>
  </ng-container>

  <!-- HEADER -->
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <!-- ROW -->
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
