<p>Material</p>
<form [formGroup]="materialForm" (ngSubmit)="onSubmit()" class="form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Informe de Ingreso de Material</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div class="form-grid">
        <!-- Datos Principales -->
        <mat-form-field appearance="outline">
          <mat-label>Tipo</mat-label>
          <input matInput formControlName="tipo">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Estado</mat-label>
          <input matInput formControlName="estado">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Marca</mat-label>
          <input matInput formControlName="marca">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Modelo</mat-label>
          <input matInput formControlName="modelo">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Número de Serie</mat-label>
          <input matInput formControlName="numSerie">
        </mat-form-field>

        <!-- Fecha con Datepicker -->
        <mat-form-field appearance="outline">
          <mat-label>Fecha de Adquisición</mat-label>
          <input matInput [matDatepicker]="pickerAdq" formControlName="fechaAdquisicion">
          <mat-datepicker-toggle matIconSuffix [for]="pickerAdq"></mat-datepicker-toggle>
          <mat-datepicker #pickerAdq></mat-datepicker>
        </mat-form-field>

        <!-- Gestión de Stock -->
        <mat-form-field appearance="outline">
          <mat-label>Cantidad</mat-label>
          <input type="number" matInput formControlName="cantidad">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Unidad de Medida</mat-label>
          <input matInput formControlName="unidadMedida" placeholder="Ej: Kg, Unidades">
        </mat-form-field>

        <!-- Control y Revisión -->
        <mat-form-field appearance="outline">
          <mat-label>Intervalo Revisión (Días)</mat-label>
          <input type="number" matInput formControlName="intervaloTiempoRevision">
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Fecha Límite de Uso</mat-label>
          <input matInput [matDatepicker]="pickerLimite" formControlName="fechaLimiteUso">
          <mat-datepicker-toggle matIconSuffix [for]="pickerLimite"></mat-datepicker-toggle>
          <mat-datepicker #pickerLimite></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Características</mat-label>
          <textarea matInput formControlName="caracteristicas"></textarea>
        </mat-form-field>
      </div>
    </mat-card-content>

    <mat-card-actions align="end">
      <button mat-button type="button" (click)="materialForm.reset()">Limpiar</button>
      <button mat-raised-button color="primary" type="submit" [disabled]="materialForm.invalid">
        <mat-icon>save</mat-icon> Guardar Ingreso
      </button>
    </mat-card-actions>
  </mat-card>
</form>
