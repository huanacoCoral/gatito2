<p>emergencia works!</p>
<div>
    <mat-card class="mat-elevation-z8">
    <mat-card-header>
        <mat-card-title> Rol: ----</mat-card-title>
        <mat-card-subtitle>Listado de EMERGENCIAS</mat-card-subtitle>
    </mat-card-header>
    <div>

        <mat-form-field>
            <mat-label>Buscar</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Buscar...." #input>
        </mat-form-field>
        <mat-card-actions align="end" (click)="agregarNuevo()">
            <button matFab extended>
                <mat-icon>add</mat-icon>
                Recepcion de Emergencia
            </button>
        </mat-card-actions>

    </div>
    <div class="mat-elevation-z8">
    <table mat-table [dataSource]="dataSource" matSort >
        <!-- ID Column -->
        <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
        <td mat-cell *matCellDef="let row; let i = index"> {{i + 1}} </td>
        </ng-container>

        
        <ng-container matColumnDef="direccion">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Direccion </th>
        <td mat-cell *matCellDef="let row"> {{row.direccion}}</td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="nombrePersona">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> nombrePersona </th>
        <td mat-cell *matCellDef="let row"> {{row.nombrePersona}} </td>
        </ng-container>

        <!-- Fruit Column -->
        <ng-container matColumnDef="fecha">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> fecha </th>
        <td mat-cell *matCellDef="let row"> {{row.fecha}} </td>
        </ng-container>
        <ng-container matColumnDef="hora">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Hora </th>
        <td mat-cell *matCellDef="let row"> {{row.hora}} </td>
        </ng-container>

        <ng-container matColumnDef="opcion">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Opcion </th>
        <td mat-cell *matCellDef="let row">
             <button mat-icon-button color="primary" aria-label="Editar registro" (click)="editar(row)">
                <mat-icon>edit</mat-icon>
                </button>
             <button mat-icon-button color="primary" aria-label="Editar registro" (click)="eliminar(row)">
                 <mat-icon>delete</mat-icon> 
            </button> 
        </td>
        </ng-container>
        <ng-container matColumnDef="informe">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> informe </th>
        <td mat-cell *matCellDef="let row">
             <button mat-icon-button color="primary" aria-label="Editar registro" (click)="informe(row)">
                <mat-icon>history_edu</mat-icon>
                redactar informe
                </button>
             
        </td>
        </ng-container>informe

        <tr mat-header-row *matHeaderRowDef="displayedColumnsDeBaja"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumnsDeBaja;"></tr>

        <!-- Row shown when there is no matching data. -->
        <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4">No data matching the filter "ptd>
        </tr>
    </table>

    <mat-paginator  [pageSizeOptions]="[2,5, 10, 25, 100]" aria-label="Select page of users"></mat-paginator>
    </div>
    </mat-card>
</div>
